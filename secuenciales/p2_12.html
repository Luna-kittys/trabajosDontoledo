    <h2>2.12 — Descuento + IVA</h2>
    <p class="descripcion">Calcula el precio final de un artículo aplicando 20% de descuento y 15% de IVA.</p>

    <img src="../images/descuento.png" class="imagen-referencia">

    <label>Precio original ($):</label>

      <p>IVA 15%: <strong id="r-iva"></strong></p>
      <p class="total">Total final: $<span id="r-total"></span></p>
