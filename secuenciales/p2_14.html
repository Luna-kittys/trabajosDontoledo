<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2.14 Cheque de Viáticos</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
<div class="pagina">

  <div class="barra-nav">
    <span class="nombre-nav" id="nombre-nav">Usuario</span>
    <a href="../index.html" class="btn-inicio">🏠</a>
  </div>

  <div class="caja-problema">
    <h2>2.14 — Cheque de Viáticos</h2>
    <p class="descripcion">Calcula el monto del cheque para un empleado que viaja a Monterrey. Cubre hotel, comida y $100 diarios extras.</p>

    <img src="../images/hotel_viaticos.png" class="imagen-referencia">

    <label>Número de días:</label>
    <input type="number" id="dias" placeholder="Ej: 5">

    <label>Costo de hotel por noche ($):</label>
    <input type="number" id="hotel" placeholder="Ej: 800">

    <label>Costo de comida por día ($):</label>
    <input type="number" id="comida" placeholder="Ej: 200">

    <button class="btn-calcular" onclick="calcular_2_14()">Calcular</button>

    <div class="resultado" id="resultado">
      <h3>Desglose</h3>
      <p>Días: <strong id="r-dias"></strong></p>
      <p>Hotel: <strong id="r-hotel"></strong></p>
      <p>Comida: <strong id="r-comida"></strong></p>
      <p>Otros ($100/día): <strong id="r-otros"></strong></p>
      <p class="total">Total cheque: $<span id="r-total"></span></p>
    </div>
  </div>

</div>
<script src="../../scripts/problemas.js"></script>
<script> cargarNombre(); </script>
</body>
</html>
