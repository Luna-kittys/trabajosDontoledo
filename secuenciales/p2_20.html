    <p class="descripcion">Determina cuánto debe cobrarle el hotel a un huésped según las noches de estancia y el costo por noche.</p>

    <img src="../images/hotel.png" class="imagen-referencia">

    <label>Nombre del huésped:</label>
    <input type="text" id="huesped" placeholder="Nombre completo">

    <label>Número de noches:</label>

    <div class="resultado" id="resultado">
      <h3>Resumen</h3>
      <p>Huésped: <strong id="r-huesped"></strong></p>
      <p>Noches: <strong id="r-noches"></strong></p>
      <p>Costo por noche: <strong id="r-costo"></strong></p>
      <p class="total">Total: $<span id="r-total"></span></p>
    </div>
