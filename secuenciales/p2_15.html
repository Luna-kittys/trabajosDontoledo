    <h2>2.15 — Potencia Eléctrica</h2>
    <p class="descripcion">Calcula la potencia de un circuito eléctrico. Fórmulas: V = R × I y P = V × I</p>

    <img src="../images/potencia.png" class="imagen-referencia">

    <label>Resistencia R (Ohms):</label>
    <input type="number" id="resistencia" placeholder="Ej: 10">

    <label>Corriente I (Amperes):</label>
    <input type="number" id="corriente" placeholder="Ej: 3">

    <button class="btn-calcular" onclick="calcular_2_15()">Calcular</button>

    <div class="resultado" id="resultado">
      <h3>Resultado</h3>
      <p>Resistencia (R): <strong id="r-r"></strong> Ω</p>
      <p>Corriente (I): <strong id="r-i"></strong> A</p>
      <p>Voltaje (V = R×I): <strong id="r-v"></strong> V</p>
      <p class="total">Potencia (P = V×I): <span id="r-p"></span> W</p>
    </div>
